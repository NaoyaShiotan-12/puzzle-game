<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Suika Merge Game Pro - Image Edition</title>

<style>
    body {
        margin: 0;
        background: #2c3e50;
        overflow: hidden;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        touch-action: none;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #gameContainer {
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    canvas {
        display: block;
        background: #fcf3cf; 
        border-radius: 4px;
    }

    #ui {
        position: absolute;
        top: 15px;
        left: 15px;
        color: #34495e;
        z-index: 10;
        font-weight: bold;
        font-size: 15px;
        pointer-events: none;
        background: rgba(255,255,255,0.85);
        padding: 10px 14px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    #ui div {
        margin-bottom: 3px;
    }
    #ui #hiScore {
        color: #e67e22;
        font-size: 13px;
    }

    #gameover {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.85);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        font-size: 32px;
        z-index: 20;
        border-radius: 4px;
        opacity: 0;
        transition: opacity 0.6s ease;
    }

    #newRecordTag {
        color: #f1c40f;
        font-size: 20px;
        font-weight: bold;
        margin-top: 10px;
        text-shadow: 0 0 10px rgba(241,196,15,0.8);
        animation: blink 0.8s infinite alternate;
        display: none;
    }

    @keyframes blink {
        0% { opacity: 0.4; transform: scale(0.95); }
        100% { opacity: 1; transform: scale(1.05); }
    }

    button {
        padding: 12px 28px;
        font-size: 18px;
        margin-top: 25px;
        cursor: pointer;
        background: #e67e22;
        color: white;
        border: none;
        border-radius: 25px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: 0.2s;
    }
    button:hover {
        background: #d35400;
        transform: translateY(-2px);
    }
</style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="hiScore">HI-SCORE: 0</div>
    </div>

    <div id="gameover">
        <div style="font-weight: bold; color: #e74c3c; letter-spacing: 2px;">GAME OVER</div>
        <div id="newRecordTag">✨ NEW RECORD ✨</div>
        <div id="finalScore" style="margin-top: 15px; font-size: 26px;"></div>
        <button onclick="resetGame()">RETRY</button>
    </div>

    <canvas id="game"></canvas>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 450;
canvas.height = 750;

const WIDTH = canvas.width;
const HEIGHT = canvas.height;
const DEAD_LINE_Y = 150; 

// 物理パラメータ
const gravity = 0.4;
const bounce = 0.2;     
const friction = 0.98;   

let fruits = [];
let particles = []; 
let scorePopups = []; 
let totalScore = 0;
let savedHiScore = 0; 

let currentFruitLevel = 1;
let nextFruitLevel = 1;

let mouseX = WIDTH / 2;
let isPressing = false;   
let canSpawn = true;      

let gameOver = false;
let gameOverCounter = 0;

// ★ 各フルーツの画像URLと設定（サンプルのフリーイラストURLを仮置きしています）
// ご自身で画像を用意する場合は、url: "images/cherry.png" のようにパスを書き換えてください。
const fruitDetails = [
    { radius: 18, color: "#ff4d4d", score: 1,  url: "1.png" }, // 1: さくらんぼ
    { radius: 24, color: "#ff7675", score: 2,  url: "https://imgur.com" }, // 2: いちご
    { radius: 32, color: "#a29bfe", score: 4,  url: "https://imgur.com" }, // 3: ぶどう
    { radius: 40, color: "#ffeaa7", score: 6,  url: "https://imgur.com" }, // 4: デコポン
    { radius: 50, color: "#fab1a0", score: 10, url: "https://imgur.com" }, // 5: かき
    { radius: 60, color: "#ff7675", score: 15, url: "https://imgur.com" }, // 6: りんご
    { radius: 72, color: "#fdcb6e", score: 21, url: "https://imgur.com" }, // 7: なし
    { radius: 84, color: "#fd79a8", score: 28, url: "https://imgur.com" }, // 8: 桃
    { radius: 96, color: "#f1c40f", score: 36, url: "https://imgur.com" }, // 9: パイナップル
    { radius: 110, color: "#2ecc71", score: 45, url: "https://imgur.com" }, // 10: メロン
    { radius: 128, color: "#27ae60", score: 55, url: "https://imgur.com" }  // 11: スイカ
];

// ★ 画像オブジェクトを自動生成して事前読み込み
fruitDetails.forEach(details => {
    details.image = new Image();
    details.image.src = details.url;
    details.image.loaded = false;
    details.image.onload = () => { details.image.loaded = true; };
});

// Web Audio API を使った効果音管理クラス
class SoundEffects {
    constructor() { this.ctx = null; }
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }
    playDrop() {
        this.init(); if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1); 
        gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.1); 
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(now); osc.stop(now + 0.1);
    }
    playMerge() {
        this.init(); if (!this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(300, now);
        osc.frequency.setValueAtTime(600, now + 0.05); osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.2); 
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(now); osc.stop(now + 0.2);
    }
    playGameOver() {
        this.init(); if (!this.ctx) return;
        const now = this.ctx.currentTime;
        for (let i = 0; i < 3; i++) {
            const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = 'sawtooth'; const timeOffset = now + (i * 0.15);
            osc.frequency.setValueAtTime(300 - (i * 50), timeOffset); osc.frequency.linearRampToValueAtTime(80, timeOffset + 0.3);
            gain.gain.setValueAtTime(0.15, timeOffset); gain.gain.linearRampToValueAtTime(0.01, timeOffset + 0.3);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(timeOffset); osc.stop(timeOffset + 0.3);
        }
    }
}
const sounds = new SoundEffects();

// エフェクト用パーティクルクラス
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.radius = Math.random() * 4 + 3; 
        const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 5 + 3; 
        this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed - 2; 
        this.alpha = 1.0; this.decay = Math.random() * 0.02 + 0.015; 
    }
    update() { this.vy += gravity * 0.3; this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    }
}

// スコアポップアップテキストクラス
class ScorePopup {
    constructor(x, y, score) {
        this.x = x; this.y = y; this.text = "+" + score; this.vy = -1.2; this.alpha = 1.0; this.decay = 0.02; 
    }
    update() { this.y += this.vy; this.alpha -= this.decay; }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha;
        ctx.font = "bold 22px 'Helvetica Neue', Arial, sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.strokeStyle = "#000000"; ctx.lineWidth = 4; ctx.strokeText(this.text, this.x, this.y);
        ctx.fillStyle = "#ffffff"; ctx.fillText(this.text, this.x, this.y); ctx.restore();
    }
}

function createMergeEffect(x, y, color, score) {
    const particleCount = 15;
    for (let i = 0; i < particleCount; i++) { particles.push(new Particle(x, y, color)); }
    scorePopups.push(new ScorePopup(x, y, score));
    sounds.playMerge();
}

class Fruit {
    constructor(x, y, level) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.level = level;
        
        // ★ 1. 回転する角度を追加（最初は0度）
        this.angle = 0; 
        
        const details = fruitDetails[level - 1];
        this.radius = details.radius;
        this.color = details.color;
        this.imgInfo = details; 
    }

    update() {
        this.vy += gravity;
        this.x += this.vx;
        this.y += this.vy;

        // ★ 2. 横に動いた速度（vx）に合わせて、自然に回転角を計算
        this.angle += this.vx / this.radius;

        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -bounce; }
        if (this.x + this.radius > WIDTH) { this.x = WIDTH - this.radius; this.vx *= -bounce; }
        if (this.y + this.radius > HEIGHT) { this.y = HEIGHT - this.radius; this.vy *= -bounce; this.vx *= friction; }
    }
    
    draw() {
        if (this.imgInfo.image.loaded) {
            ctx.save();
            
            // ★ 3. フルーツの中心に座標の基準を移動させ、角度分だけ回転させる
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            
            // ★ 4. 回転した状態の中心（0, 0）を基準に丸く切り抜く
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.clip();
            
            // ★ 5. 画像を少し拡大（2.4倍）して、中心を合わせて描画する
            ctx.drawImage(
                this.imgInfo.image, 
                -this.radius * 1.2, 
                -this.radius * 1.2, 
                this.radius * 2.4, 
                this.radius * 2.4
            );

            ctx.restore();
            
            // 枠線は削除した状態をキープしています

        } else {
            // 万が一画像が読み込めない場合のバックアップ描画（単色円）
            ctx.beginPath();
            ctx.fillStyle = this.color;
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#333333";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.font = `bold ${this.radius * 0.6}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(this.level, this.x, this.y);
        }
    }
}


function loadHiScore() { const score = localStorage.getItem("suika_hi_score"); savedHiScore = score ? parseInt(score, 10) : 0; }
function randomLevel() { return Math.floor(Math.random() * 5) + 1; }
function initNextFruit() { currentFruitLevel = nextFruitLevel; nextFruitLevel = randomLevel(); }

loadHiScore();
nextFruitLevel = randomLevel();
initNextFruit();

function updateMouseX(clientX) {
    const rect = canvas.getBoundingClientRect(); let x = clientX - rect.left;
    const currentRadius = fruitDetails[currentFruitLevel - 1].radius;
    if (x < currentRadius) x = currentRadius; if (x > WIDTH - currentRadius) x = WIDTH - currentRadius;
    mouseX = x;
}

canvas.addEventListener("mousemove", (e) => { updateMouseX(e.clientX); });
canvas.addEventListener("mousedown", (e) => { sounds.init(); isPressing = true; updateMouseX(e.clientX); });
window.addEventListener("mouseup", () => { if (isPressing) { triggerSpawn(); } isPressing = false; });

canvas.addEventListener("touchmove", (e) => { e.preventDefault(); updateMouseX(e.touches.clientX); }, { passive: false });
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); sounds.init(); isPressing = true; updateMouseX(e.touches.clientX); }, { passive: false });
window.addEventListener("touchend", () => { if (isPressing) { triggerSpawn(); } isPressing = false; });

function triggerSpawn() {
    if (gameOver || !canSpawn) return;
    const newFruit = new Fruit(mouseX, DEAD_LINE_Y - 50, currentFruitLevel);
    fruits.push(newFruit);
    sounds.playDrop();
    canSpawn = false; initNextFruit();
    setTimeout(() => { canSpawn = true; }, 500);
}

function update() {
    for (let f of fruits) { f.update(); }
    for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].alpha <= 0) particles.splice(i, 1); }
    for (let i = scorePopups.length - 1; i >= 0; i--) { scorePopups[i].update(); if (scorePopups[i].alpha <= 0) scorePopups.splice(i, 1); }
    checkCollisions(); checkGameOver();
}

function checkCollisions() {
    for (let i = 0; i < fruits.length; i++) {
        for (let j = i + 1; j < fruits.length; j++) {
            const f1 = fruits[i]; const f2 = fruits[j];
            const dx = f2.x - f1.x; const dy = f2.y - f1.y;
            const dist = Math.sqrt(dx * dx + dy * dy); const minDist = f1.radius + f2.radius;

            if (dist < minDist) {
                if (f1.level === f2.level) {
                    const currentLevel = f1.level;
                    const nx = (f1.x + f2.x) / 2; const ny = (f1.y + f2.y) / 2;
                    const fruitColor = f1.color; const addedScore = currentLevel === 11 ? 100 : fruitDetails[currentLevel].score;

                    createMergeEffect(nx, ny, fruitColor, addedScore);
                    
                    if (currentLevel === 11) { fruits.splice(j, 1); fruits.splice(i, 1); totalScore += addedScore; return; }

                    const nextLevel = currentLevel + 1;
                    fruits.splice(j, 1); fruits.splice(i, 1);
                    const upgradedFruit = new Fruit(nx, ny, nextLevel); upgradedFruit.vy = -2; fruits.push(upgradedFruit);
                    totalScore += addedScore; return;
                } else {
                    const overlap = minDist - dist; const nx = dx / dist; const ny = dy / dist;
                    f1.x -= nx * overlap * 0.5; f1.y -= ny * overlap * 0.5; f2.x += nx * overlap * 0.5; f2.y += ny * overlap * 0.5;
                    const rvx = f2.vx - f1.vx; const rvy = f2.vy - f1.vy; const velAlongNormal = rvx * nx + rvy * ny;
                    if (velAlongNormal < 0) {
                        const restitution = bounce; let impulseScalar = -(1 + restitution) * velAlongNormal; impulseScalar /= 2; 
                        const impulseX = impulseScalar * nx; const impulseY = impulseScalar * ny;
                        f1.vx -= impulseX; f1.vy -= impulseY; f2.vx += impulseX; f2.vy += impulseY;
                    }
                }
            }
        }
    }
}

function checkGameOver() {
    let overflow = false;
    for (let f of fruits) { if (f.y - f.radius < DEAD_LINE_Y && Math.abs(f.vy) < 1) { overflow = true; break; } }
    if (overflow) {
        gameOverCounter++;
        if (gameOverCounter > 150) { gameOver = true; triggerGameOverUI(); }
    } else { gameOverCounter = 0; }
}

function triggerGameOverUI() {
    sounds.playGameOver();
    const goEl = document.getElementById("gameover"); const recordTag = document.getElementById("newRecordTag");
    if (totalScore > savedHiScore) { savedHiScore = totalScore; localStorage.setItem("suika_hi_score", savedHiScore); recordTag.style.display = "block"; } else { recordTag.style.display = "none"; }
    document.getElementById("finalScore").innerText = "SCORE : " + totalScore;
    goEl.style.display = "flex"; setTimeout(() => { goEl.style.opacity = "1"; }, 50);
}

function draw() {
    ctx.clearRect(0, 0, WIDTH, HEIGHT);

    if (gameOverCounter > 0) {
        const pulse = Math.abs(Math.sin(gameOverCounter * 0.15));
        ctx.strokeStyle = `rgba(231, 76, 60, ${pulse})`; ctx.lineWidth = 4;
    } else { ctx.strokeStyle = "#7f8c8d"; ctx.lineWidth = 1; }
    ctx.beginPath(); ctx.moveTo(0, DEAD_LINE_Y); ctx.lineTo(WIDTH, DEAD_LINE_Y); ctx.stroke();

    for (let f of fruits) { f.draw(); }
    for (let p of particles) p.draw();
    for (let popup of scorePopups) popup.draw();

    if (!gameOver && canSpawn) {
        ctx.strokeStyle = "rgba(52, 152, 219, 0.3)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(mouseX, DEAD_LINE_Y - 50); ctx.lineTo(mouseX, HEIGHT); ctx.stroke();

        const preview = new Fruit(mouseX, DEAD_LINE_Y - 50, currentFruitLevel);
        ctx.globalAlpha = 0.8; preview.draw(); ctx.globalAlpha = 1.0;
    }

    drawNextPreview(); drawEvolutionCircle(); updateUI();
}

function drawNextPreview() {
    const boxX = WIDTH - 90; const boxY = 15;
    ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.fillRect(boxX, boxY, 75, 75);
    ctx.strokeStyle = "#34495e"; ctx.lineWidth = 2; ctx.strokeRect(boxX, boxY, 75, 75);
    ctx.fillStyle = "#34495e"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center"; ctx.fillText("NEXT", boxX + 37.5, boxY + 18);

    const nextFruit = new Fruit(boxX + 37.5, boxY + 48, nextFruitLevel);
    if(nextFruit.radius > 20) nextFruit.radius = 20; 
    nextFruit.draw();
}

// ★ 進化サークル側も画像で綺麗に表示されるようアップデート
function drawEvolutionCircle() {
    const centerX = WIDTH - 60; const centerY = 180; const circleRadius = 38;    
    ctx.fillStyle = "rgba(255, 255, 255, 0.7)"; ctx.beginPath(); ctx.arc(centerX, centerY, circleRadius + 18, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "rgba(52, 73, 94, 0.3)"; ctx.lineWidth = 1; ctx.stroke();

    const totalNodes = fruitDetails.length;
    for (let i = 0; i < totalNodes; i++) {
        const angle = (i / totalNodes) * Math.PI * 2 - Math.PI / 2;
        const nodeX = centerX + Math.cos(angle) * circleRadius; const nodeY = centerY + Math.sin(angle) * circleRadius;
        const nodeRadius = 9; 

        if (fruitDetails[i].image.loaded) {
            ctx.save();
            ctx.beginPath(); ctx.arc(nodeX, nodeY, nodeRadius, 0, Math.PI * 2); ctx.clip();
            ctx.drawImage(fruitDetails[i].image, nodeX - nodeRadius, nodeY - nodeRadius, nodeRadius * 2, nodeRadius * 2);
            ctx.restore();
            ctx.beginPath(); ctx.arc(nodeX, nodeY, nodeRadius, 0, Math.PI * 2); ctx.strokeStyle = "#333333"; ctx.lineWidth = 1; ctx.stroke();
        } else {
            ctx.beginPath(); ctx.fillStyle = fruitDetails[i].color; ctx.arc(nodeX, nodeY, nodeRadius, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.font = "bold 8px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(i + 1, nodeX, nodeY);
        }
    }
    ctx.fillStyle = "#34495e"; ctx.font = "9px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("EVO ↻", centerX, centerY);
}

function updateUI() {
    document.getElementById("score").innerText = "SCORE: " + totalScore;
    document.getElementById("hiScore").innerText = "HI-SCORE: " + savedHiScore;
}

function resetGame() {
    fruits = []; particles = []; scorePopups = []; totalScore = 0; gameOverCounter = 0; gameOver = false; canSpawn = true;
    initNextFruit();
    const goEl = document.getElementById("gameover"); goEl.style.opacity = "0"; setTimeout(() => { goEl.style.display = "none"; }, 600);
}

function loop() { if (!gameOver) { update(); } draw(); requestAnimationFrame(loop); }
loop();
</script>

</body>
</html>
